{% extends "admin/base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}

{% block content %}
<div class="login-card" style="text-align:center; max-width:440px;">
  <div style="width:64px;height:64px;border-radius:50%;background:#dcfce7;color:#16a34a;
              display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h2 style="font-size:1.4rem; margin-bottom:.6rem; color:#15803d;">E-mail confirmado!</h2>
  <p style="color:#475569; font-size:.95rem; line-height:1.6; margin-bottom:1.8rem;">
    Sua conta foi verificada com sucesso. Agora você já pode fazer login e começar a aproveitar
    os <strong>Doces da Fhê</strong>! 🍫
  </p>

  <a href="{{ url_for('login') }}"
     style="display:inline-block; background:#5B6D3D; color:#fff; text-decoration:none;
            font-weight:700; font-size:.95rem; padding:.7rem 2rem; border-radius:32px;
            transition:background .18s;">
    Fazer login
  </a>
</div>
{% endblock %}
