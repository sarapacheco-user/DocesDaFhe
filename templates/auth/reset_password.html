{% extends "admin/base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='password.css') }}">
{% endblock %}

{% block content %}
<div class="pwd-card">
  <h2>Redefinir Senha</h2>
  <p class="pwd-subtitle">Digite sua nova senha abaixo.</p>

  <form method="POST">

    <div class="pwd-field">
      <label for="password">Nova Senha</label>
      <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
      <small>Mínimo 6 caracteres</small>
    </div>

    <div class="pwd-field">
      <label for="confirm-password">Confirmar Senha</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Repita a nova senha" required>
    </div>

    <div class="pwd-actions">
      <button type="submit">Redefinir Senha</button>
      <a href="{{ url_for('login') }}">Voltar ao Login</a>
    </div>

  </form>
</div>
{% endblock %}
