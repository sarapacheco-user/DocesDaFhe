{% extends "admin/base.html" %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% if site_config and site_config.auth_bg_color1 %}
<div id="authBgData" data-c1="{{ site_config.auth_bg_color1 }}" data-c2="{{ site_config.auth_bg_color2 }}" style="display:none;"></div>
<script>
  var d = document.getElementById('authBgData');
  if (d) document.body.style.setProperty('background', 'linear-gradient(135deg,' + d.dataset.c1 + ' 0%,' + d.dataset.c2 + ' 100%)', 'important');
</script>
{% endif %}
{% endblock %}

{% block content %}
<div class="signup-card">
  <h2>Criar Conta</h2>

  <form method="POST">
    <input type="text" name="name" placeholder="Nome Completo" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Senha" required>
    <input type="password" name="confirm-password" placeholder="Confirmar Senha" required>
    <input type="tel" name="phone" placeholder="Telefone" required>
    <input type="text" name="cep" placeholder="CEP" required>
    <button type="submit">Criar Conta</button>
  </form>

  <div class="signup-links">
    <a href="/login">Já tem uma conta? Entrar</a>
  </div>
</div>
{% endblock %}
