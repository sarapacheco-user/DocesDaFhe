{% extends "admin/base.html" %}
<!-- Página de cadastro: criação de conta de novo cliente -->
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% if site_config and site_config.auth_bg_color1 %}
<div id="authBgData" data-c1="{{ site_config.auth_bg_color1 }}" data-c2="{{ site_config.auth_bg_color2 }}" style="display:none;"></div>
<script>
  var d = document.getElementById('authBgData');
  if (d) document.body.style.setProperty('background', 'linear-gradient(135deg,' + d.dataset.c1 + ' 0%,' + d.dataset.c2 + ' 100%)', 'important');
</script>
{% endif %}
{% endblock %}

{% block content %}
<!-- CARD DE CADASTRO -->
<div class="signup-card">
  <h2>Criar Conta</h2>

  <!-- Formulário de registro: dados do cliente -->
  <form method="POST">
    <input type="text" name="name" placeholder="Nome Completo" value="{{ old.name if old else '' }}" required>
    <input type="email" name="email" placeholder="Email" value="{{ old.email if old else '' }}" required>
    <input type="password" name="password" placeholder="Senha" required>
    <input type="password" name="confirm-password" placeholder="Confirmar Senha" required>
    <input type="tel" name="phone" placeholder="Telefone" value="{{ old.phone if old else '' }}" required>
    <input type="text" name="cep" placeholder="CEP" value="{{ old.cep if old else '' }}" required>
    <button type="submit">Criar Conta</button>
  </form>

  <!-- Link para quem já tem conta -->
  <div class="signup-links">
    <a href="/login">Já tem uma conta? Entrar</a>
  </div>
</div>
{% endblock %}
