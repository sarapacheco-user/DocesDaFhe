{% extends "base.html" %}

{% block content %}
<h2>Welcome, {{ user.email }}!</h2>

{% if user.is_admin %}
    <div style="background-color: #e8f4ff; padding: 15px; margin: 20px 0; border-radius: 5px;">
        <h3>Admin Panel</h3>
        <p>You have administrator privileges.</p>
        <a href="{{ url_for('list_products') }}" class="btn btn-primary">Manage Products</a>
    </div>
{% else %}
    <div style="background-color: #f0f0f0; padding: 15px; margin: 20px 0; border-radius: 5px;">
        <h3>Regular User</h3>
        <p>Browse our products below:</p>
        <a href="{{ url_for('list_products') }}" class="btn btn-primary">View Products</a>
    </div>
{% endif %}

<p>
    <a href="{{ url_for('change_password') }}">Change Password</a>
</p>
<p>
    <a href="{{ url_for('logout') }}" style="color: red;">Logout</a>
</p>
{% endblock %}
