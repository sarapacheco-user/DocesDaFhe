{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='password.css') }}">
{% endblock %}

{% block content %}
<div class="pwd-card">
  <h2>Alterar Senha</h2>

  <form method="POST">

    <div class="pwd-field">
      <label for="current_password">Senha Atual</label>
      <input type="password" id="current_password" name="current_password" placeholder="Digite sua senha atual" required>
    </div>

    <div class="pwd-field">
      <label for="new_password">Nova Senha</label>
      <input type="password" id="new_password" name="new_password" placeholder="Mínimo 6 caracteres" required>
      <small>Mínimo 6 caracteres</small>
    </div>

    <div class="pwd-field">
      <label for="confirm_password">Confirmar Nova Senha</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Repita a nova senha" required>
    </div>

    <div class="pwd-actions">
      <button type="submit">Alterar Senha</button>
      <a href="{{ url_for('dashboard') }}">Cancelar</a>
    </div>

  </form>
</div>
{% endblock %}
