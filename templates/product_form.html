{% extends "base.html" %}
<<<<<<< HEAD
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">{% if product %}Editar Produto{% else %}Criar Produto{% endif %}</h3>
        </div>

        <div class="card-body">

          <!-- ✅ UM SÓ FORM com enctype para suportar upload -->
          <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
              <label for="name" class="form-label">Nome do Produto *</label>
              <input type="text" class="form-control" id="name" name="name"
                     value="{{ product.name if product else '' }}" required>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Descrição *</label>
              <textarea class="form-control" id="description" name="description"
                        rows="4" required>{{ product.description if product else '' }}</textarea>
            </div>

            <div class="mb-3">
              <label for="category" class="form-label">Categoria</label>
              <select class="form-control" id="category" name="category">
                <option value="bolos"       {% if product and product.category == 'bolos' %}selected{% endif %}>Bolos</option>
                <option value="brigadeiros" {% if product and product.category == 'brigadeiros' %}selected{% endif %}>Brigadeiros</option>
                <option value="chocolates"  {% if product and product.category == 'chocolates' %}selected{% endif %}>Chocolates</option>
                <option value="trufas"     {% if product and product.category == 'trufas' %}selected{% endif %}>Trufas</option>
                <option value="geral"       {% if product and product.category == 'geral' %}selected{% endif %}>Geral</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="price" class="form-label">Preço (R$) *</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control" id="price" name="price"
                       step="0.01" min="0.01"
                       value="{{ '%.2f'|format(product.price) if product else '' }}" required>
              </div>
            </div>

            <!-- ✅ Upload dentro do mesmo form -->
            <div class="mb-3">
              <label for="arquivo" class="form-label">Imagem do Produto</label>
              {% if product and product.image_url %}
                <div style="margin-bottom:.6rem;">
                  <img src="{{ product.image_url }}" alt="Imagem atual"
                       style="height:80px; border-radius:8px; border:1.5px solid var(--card-border);">
                  <p style="font-size:.78rem; color:var(--text-mid); margin-top:.3rem;">Imagem atual</p>
                </div>
              {% endif %}
              <input type="file" class="form-control" id="arquivo" name="arquivo"
                     accept="image/*" onchange="previewImagem(this)">
              <div id="previewWrap" style="margin-top:.6rem; display:none;">
                <img id="previewImg" src="" alt="preview"
                     style="height:80px; border-radius:8px; border:1.5px solid var(--card-border);">
                <p style="font-size:.78rem; color:var(--text-mid); margin-top:.3rem;">Nova imagem</p>
              </div>
            </div>

            <div class="d-flex justify-content-between gap-2" style="margin-top:1.2rem;">
              <button type="submit" class="btn btn-primary">
                {% if product %}Atualizar{% else %}Criar{% endif %} Produto
              </button>
              <a href="{{ url_for('list_products') }}" class="btn btn-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function previewImagem(input) {
    const wrap = document.getElementById('previewWrap');
    const img  = document.getElementById('previewImg');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        img.src = e.target.result;
        wrap.style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
{% endblock %}
