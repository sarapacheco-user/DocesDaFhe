{% extends "base.html" %}
{% block content %}
<h2>Manage Products for "{{ kit.name }}"</h2>
<form method="POST">
  <table class="table">
    <thead>
      <tr>
        <th>Include</th>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
      </tr>
    </thead>
    <tbody>
      {% for product in all_products %}
        {% set kp = kit_products.get(product.id) %}
        <tr>
          <td>
            <input type="checkbox" name="product_id" value="{{ product.id }}"
                   {% if kp %}checked{% endif %}>
          </td>
          <td>{{ product.name }}</td>
          <td>${{ "%.2f"|format(product.price) }}</td>
          <td>
            <input type="number" name="quantity" value="{{ kp.quantity if kp else 1 }}"
                   min="1" step="1" class="form-control" style="width:80px;">
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('view_kit', kit_id=kit.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
