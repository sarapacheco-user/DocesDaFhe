{% extends "base.html" %}
{% block content %}
<h2>Criar novo Kit</h2>
<form method="POST">
  <div class="mb-3">
    <label for="name" class="form-label">Nome do Kit *</label>
    <input type="text" class="form-control" id="name" name="name" required>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Descrição</label>
    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
  </div>
  <div class="mb-3">
    <label for="image_url" class="form-label">URL da imagem do Kit (optional)</label>
    <input type="url" class="form-control" id="image_url" name="image_url" 
           placeholder="https://example.com/kit-image.jpg">
  </div>
  <button type="submit" class="btn btn-primary">Cria Kit</button>
  <a href="{{ url_for('list_kits') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
