{% extends "admin/base.html" %}
<!-- Formulário de criação de novo kit: nome, descrição, foto, preço e produtos incluídos -->
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
<style>
  .preview-kit-wrap { margin-top: .7rem; display: none; }
  .preview-kit-label { font-size: .74rem; color: #64748b; margin-top: .3rem; }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Criar Novo Kit</h3>
        </div>

        <div class="card-body">
          <!-- ✅ enctype para suportar upload -->
          <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
              <label for="name" class="form-label">Nome do Kit *</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
              <label for="resumo" class="form-label">Resumo <small class="text-muted">(exibido no topo da página)</small></label>
              <textarea class="form-control" id="resumo" name="resumo"
                        rows="2" maxlength="400"
                        placeholder="Breve descrição do kit (até 400 caracteres)"></textarea>
              <small class="text-muted"><span id="resumo-count">0</span>/400 caracteres</small>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Descrição completa</label>
              <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>

            <!-- ✅ Upload substituindo URL -->
            <div class="mb-3">
              <label for="arquivo" class="form-label">Imagem do Kit (opcional)</label>
              <input type="hidden" name="imagem_b64" id="imgB64Kit">
              <input type="file" class="form-control" id="arquivo" name="arquivo"
                     accept="image/*" onchange="adminOpenCropper(this, 'previewImg', 'previewWrap')">
              <div id="previewWrap" class="preview-kit-wrap">
                <div style="width:200px; height:200px; border-radius:10px; overflow:hidden; border:2px solid var(--color-primary, #5B6D3D);">
                  <img id="previewImg" src="" alt="preview">
                </div>
                <p class="preview-kit-label">Nova imagem selecionada</p>
              </div>
            </div>

            <div class="d-flex justify-content-between gap-2">
              <button type="submit" class="btn-primary">Criar Kit</button>
              <a href="{{ url_for('list_kits') }}" class="btn-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('resumo').addEventListener('input', function() {
    document.getElementById('resumo-count').textContent = this.value.length;
  });
</script>
{% endblock %}
