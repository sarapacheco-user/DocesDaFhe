{% extends "admin/base.html" %}
<!-- Formulário de criação de evento especial: data, nome, descrição e produtos vinculados -->
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
<style>
  .ev-form-card { max-width: 560px; margin: 2rem auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.08); overflow: hidden; }
  .ev-form-header { background: var(--color-secondary); color: #fff; padding: 1.2rem 1.6rem; }
  .ev-form-header h3 { margin: 0; font-size: 1.1rem; font-weight: 700; }
  .ev-form-body { padding: 1.6rem; display: flex; flex-direction: column; gap: 1rem; }
  .ev-field label { display: block; font-size: .82rem; font-weight: 700; color: #334155; margin-bottom: .4rem; }
  .ev-field input, .ev-field textarea { width: 100%; padding: .65rem .9rem; border: 1.5px solid #e2e8f0; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: .92rem; color: #1e293b; outline: none; transition: border-color .2s; box-sizing: border-box; }
  .ev-field input:focus, .ev-field textarea:focus { border-color: var(--color-secondary); }
  .ev-field textarea { resize: vertical; min-height: 80px; }
  .ev-field .hint { font-size: .75rem; color: #94a3b8; margin-top: .3rem; }
  .ev-agend { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 1rem 1.1rem; }
  .ev-agend-title { font-size: .8rem; font-weight: 800; color: var(--color-primary); margin-bottom: .7rem; text-transform: uppercase; letter-spacing: .05em; }
  .ev-agend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
  .ev-dt-row { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; }
  .ev-dt-sub label { font-size: .75rem; font-weight: 600; color: #64748b; margin-bottom: .3rem; }
  .ev-actions { display: flex; gap: .8rem; justify-content: flex-end; padding-top: .4rem; }
  .ev-btn-submit { background: var(--color-secondary); color: #fff; border: none; border-radius: 24px; padding: .6rem 1.4rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .92rem; cursor: pointer; transition: background .2s; }
  .ev-btn-submit:hover { background: var(--color-hover-secondary); }
  .ev-btn-cancel { background: #f1f5f9; color: #64748b; border: none; border-radius: 24px; padding: .6rem 1.4rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .92rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
  .ev-btn-cancel:hover { background: #e2e8f0; }
</style>
{% endblock %}

{% block content %}
<div class="ev-form-card">
  <div class="ev-form-header">
    <h3>✨ Criar Evento Especial</h3>
  </div>
  <form method="POST" class="ev-form-body">

    <div class="ev-field">
      <label>Nome do Evento *</label>
      <input type="text" name="nome" placeholder="Ex: Páscoa 2026" required>
    </div>

    <div class="ev-field">
      <label>Descrição</label>
      <textarea name="descricao" id="descricao" maxlength="300" placeholder="Descreva o evento..."></textarea>
      <span class="hint char-counter"><span id="descricao-count">0</span>/300 caracteres</span>
    </div>

    <!-- Agendamento automático -->
    <div class="ev-agend">
      <div class="ev-agend-title">Agendamento automático</div>
      <div class="ev-agend-grid">
        <div class="ev-field">
          <label>Início</label>
          <div class="ev-dt-row">
            <div class="ev-dt-sub">
              <label>Data</label>
              <input type="date" name="data_inicio_date">
            </div>
            <div class="ev-dt-sub">
              <label>Hora</label>
              <input type="time" name="data_inicio_time">
            </div>
          </div>
          <span class="hint">Deixe em branco para ativar imediatamente</span>
        </div>
        <div class="ev-field">
          <label>Fim</label>
          <div class="ev-dt-row">
            <div class="ev-dt-sub">
              <label>Data</label>
              <input type="date" name="data_fim_date">
            </div>
            <div class="ev-dt-sub">
              <label>Hora</label>
              <input type="time" name="data_fim_time">
            </div>
          </div>
          <span class="hint">Deixe em branco para sem data de fim</span>
        </div>
      </div>
    </div>

    <div class="ev-actions">
      <a href="{{ url_for('listar_eventos') }}" class="ev-btn-cancel">Cancelar</a>
      <button type="submit" class="ev-btn-submit">Criar Evento</button>
    </div>
  </form>
</div>
<script>
  document.getElementById('descricao').addEventListener('input', function() {
    document.getElementById('descricao-count').textContent = this.value.length;
  });
</script>
{% endblock %}
