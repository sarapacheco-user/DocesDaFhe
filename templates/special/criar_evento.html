{% extends "base.html" %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}
{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Criar Evento Especial</h3>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Nome do Evento *</label>
              <input type="text" class="form-control" name="nome"
                     placeholder="Ex: Páscoa 2026" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <textarea class="form-control" name="descricao" rows="3"
                        placeholder="Descreva o evento..."></textarea>
            </div>
            <div class="d-flex justify-content-between gap-2">
              <button type="submit" class="btn btn-primary">Criar Evento</button>
              <a href="{{ url_for('listar_eventos') }}" class="btn btn-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
