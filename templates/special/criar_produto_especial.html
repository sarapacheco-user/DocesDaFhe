{% extends "admin/base.html" %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Adicionar Produto — {{ evento.nome }}</h3>
        </div>

        <div class="card-body">
          <!-- ✅ UM SÓ form com enctype -->
          <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
              <label class="form-label">Nome *</label>
              <input type="text" class="form-control" name="name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Descrição *</label>
              <textarea class="form-control" name="description" rows="3" required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Preço (R$) *</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control" name="price"
                       step="0.01" min="0.01" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Categoria</label>
              <select class="form-control" name="category">
                <option value="bolos">Bolos</option>
                <option value="brigadeiros">Brigadeiros</option>
                <option value="chocolates">Chocolates</option>
                <option value="trufas">Trufas</option>
                <option value="geral">Geral</option>
              </select>
            </div>

            <!-- ✅ Upload dentro do mesmo form -->
            <div class="mb-3">
              <label for="arquivo" class="form-label">Imagem (opcional)</label>
              <input type="file" class="form-control" id="arquivo" name="arquivo"
                     accept="image/*" onchange="previewImagem(this)">
              <div id="previewWrap" style="margin-top:.6rem; display:none;">
                <img id="previewImg" src="" alt="preview"
                     style="height:80px; border-radius:8px; border:1.5px solid var(--card-border);">
                <p style="font-size:.78rem; color:var(--text-mid); margin-top:.3rem;">Preview</p>
              </div>
            </div>

            <div class="mb-3 checkboxes-wrap">
              <label class="check-label">
                <input type="checkbox" name="mostrar" checked> Mostrar na loja
              </label>
            </div>

            <div class="d-flex justify-content-between gap-2">
              <button type="submit" class="btn-primary">Adicionar Produto</button>
              <a href="{{ url_for('listar_produtos_especiais', evento_id=evento.id) }}"
                 class="btn-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function previewImagem(input) {
    const wrap = document.getElementById('previewWrap');
    const img  = document.getElementById('previewImg');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
{% endblock %}
