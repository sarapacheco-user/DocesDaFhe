{% extends "base.html" %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Editar Produto</h3>
        </div>

        <div class="card-body">
          <!-- ✅ enctype para suportar upload -->
          <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
              <label class="form-label">Nome *</label>
              <input type="text" class="form-control" name="name"
                     value="{{ produto.name }}" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Descrição *</label>
              <textarea class="form-control" name="description"
                        rows="3" required>{{ produto.description }}</textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Preço (R$) *</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control" name="price"
                       step="0.01" min="0.01"
                       value="{{ '%.2f'|format(produto.price) }}" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Categoria</label>
              <!-- ✅ == em vez de = e sem __ -->
              <select class="form-control" name="category">
                <option value="bolos"       {{ 'selected' if produto.category == 'bolos' }}>Bolos</option>
                <option value="brigadeiros" {{ 'selected' if produto.category == 'brigadeiros' }}>Brigadeiros</option>
                <option value="chocolates"  {{ 'selected' if produto.category == 'chocolates' }}>Chocolates</option>
                <option value="bombons"     {{ 'selected' if produto.category == 'bombons' }}>Bombons</option>
                <option value="geral"       {{ 'selected' if produto.category == 'geral' }}>Geral</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="arquivo" class="form-label">Imagem (opcional)</label>

              <!-- mostra imagem atual se existir -->
              {% if produto.image_url %}
              <div style="margin-bottom:.6rem;">
                <img src="{{ url_for('static', filename=produto.image_url) }}"
                     alt="Imagem atual"
                     style="height:80px; border-radius:8px; border:1.5px solid var(--card-border);">
                <p style="font-size:.78rem; color:var(--text-mid); margin-top:.3rem;">Imagem atual</p>
              </div>
              {% endif %}

              <input type="file" class="form-control" id="arquivo" name="arquivo"
                     accept="image/*" onchange="previewImagem(this)">
              <div id="previewWrap" style="margin-top:.6rem; display:none;">
                <img id="previewImg" src="" alt="preview"
                     style="height:80px; border-radius:8px; border:1.5px solid var(--card-border);">
                <p style="font-size:.78rem; color:var(--text-mid); margin-top:.3rem;">Nova imagem</p>
              </div>
            </div>

            <div class="mb-3 checkboxes-wrap">
              <label class="check-label">
                <input type="checkbox" name="mostrar"
                       {{ 'checked' if produto.mostrar }}> Mostrar na loja
              </label>
            </div>

            <div class="d-flex justify-content-between gap-2">
              <button type="submit" class="btn btn-primary">Salvar Alterações</button>
              <a href="{{ url_for('listar_produtos_especiais', evento_id=produto.evento_id) }}"
                 class="btn btn-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function previewImagem(input) {
    const wrap = document.getElementById('previewWrap');
    const img  = document.getElementById('previewImg');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
{% endblock %}
